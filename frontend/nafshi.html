    <section class="login-center-section">
        <div class="login-center-wrap">
            <h1>לאָג אַריין</h1>
            <p>דאס איז דער אריינגאנג צום גאנצן סייט. נאך לאָגין האסטו פולע צוטריט.</p>
            <form id="login-form" class="auth-card auth-single">
                <h3>נפשי</h3>
                <label for="login-name" class="form-label">נאמען</label>
                <input id="login-name" name="name" class="form-control" type="text"
                    placeholder="אימעיל / נאמען / פען נאמען" required>
                <label for="login-password" class="form-label">קאוד</label>
                <div class="pw-wrap">
                    <input id="login-password" name="password" class="form-control" type="password" required>
                    <button class="pw-toggle" type="button" tabindex="-1" aria-label="הראה קאוד"><svg
                            xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            viewBox="0 0 16 16">
                            <path
                                d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z" />
                            <path
                                d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z" />
                        </svg></button>
                </div>
                <button type="submit" class="btn btn-primary auth-btn">אַרײַנגיין</button>
                <p class="auth-switch-text">האסט נישט קיין חשבון?</p>
                <button type="button" class="btn btn-outline-secondary auth-switch-btn" data-bs-toggle="modal"
                    data-bs-target="#createAccountModal">שאַף אַ נײַעם חשבון</button>
                <p id="login-message" class="auth-message" aria-live="polite"></p>
            </form>
        </div>
    </section>

    <div class="modal fade" id="createAccountModal" tabindex="-1" aria-labelledby="createAccountModalLabel"
        data-bs-backdrop="static" data-bs-keyboard="false" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="modal-title" id="createAccountModalLabel">שאַף אַ נײַעם חשבון</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="create-account-form">
                    <div class="modal-body">
                        <label for="create-firstname" class="form-label">ערשטע נאמען</label>
                        <input id="create-firstname" name="firstname" class="form-control" type="text" required>
                        <label for="create-lastname" class="form-label mt-2">לעצטע נאמען</label>
                        <input id="create-lastname" name="lastname" class="form-control" type="text" required>
                        <label for="create-nickname" class="form-label mt-2">פען נאמען (אפשאנעל)</label>
                        <input id="create-nickname" name="nickname" class="form-control" type="text" maxlength="24">
                        <label for="create-email" class="form-label mt-2">אימעיל</label>
                        <input id="create-email" name="email" class="form-control" type="email" required>
                        <label for="create-password" class="form-label mt-2">קאוד</label>
                        <div class="pw-wrap">
                            <input id="create-password" name="password" class="form-control" type="password"
                                minlength="4" required>
                            <button class="pw-toggle" type="button" tabindex="-1" aria-label="הראה קאוד"><svg
                                    xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                    viewBox="0 0 16 16">
                                    <path
                                        d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z" />
                                    <path
                                        d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z" />
                                </svg></button>
                        </div>
                        <label for="create-password-confirm" class="form-label mt-2">באשטעטיג קאוד</label>
                        <div class="pw-wrap">
                            <input id="create-password-confirm" name="passwordConfirm" class="form-control"
                                type="password" minlength="4" required>
                            <button class="pw-toggle" type="button" tabindex="-1" aria-label="הראה קאוד"><svg
                                    xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                    viewBox="0 0 16 16">
                                    <path
                                        d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z" />
                                    <path
                                        d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z" />
                                </svg></button>
                        </div>
                        <p id="create-message" class="auth-message mt-2" aria-live="polite"></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">פארמאכן</button>
                        <button type="submit" class="btn btn-primary auth-btn">שאַפֿן חשבון</button>
                    </div>
                </form>
            </div>
        </div>
