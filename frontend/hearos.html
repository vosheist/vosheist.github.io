                            <h1 class="card-title text-center mb-4"
                                style="font-family: 'Playpen Sans Hebrew', sans-serif; font-size: 2rem;">
                                דיין הערה</h1>
                            <p class="text-center text-secondary mb-4">האסט איר א האלב מיטל, שאלה, אָדער כל אנדערע?
                                שרייב אונדז!</p>

                            <form id="feedback-form">
                                <div class="mb-4">
                                    <label for="feedback-name" class="form-label fw-bold">דיין נאמען</label>
                                    <input id="feedback-name" name="name" class="form-control form-control-lg"
                                        type="text" placeholder="לייג אריין דיין נאמען..." required>
                                </div>

                                <div class="mb-4">
                                    <label for="feedback-email" class="form-label fw-bold">דיין יימייל
                                        (אפציונאל)</label>
                                    <input id="feedback-email" name="email" class="form-control form-control-lg"
                                        type="email" placeholder="דיין יימייל...">
                                </div>

                                <div class="mb-5">
                                    <label for="feedback-message" class="form-label fw-bold">הערה / פּרעפאָס</label>
                                    <textarea id="feedback-message" name="message" class="form-control form-control-lg"
                                        rows="6" placeholder="שרייב דיין הערה דא..." required></textarea>
                                </div>

                                <button type="submit" class="btn btn-primary btn-lg w-100 auth-btn fw-bold">
                                    שיקן הערה
                                </button>

                                <p id="feedback-message-status" class="auth-message mt-3 text-center"
                                    aria-live="polite"></p>
                            </form>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        const FEEDBACK_ENDPOINT = "http://localhost:3000/api/feedback"; // Backend feedback endpoint

        document.getElementById("feedback-form").addEventListener("submit", async (event) => {
            event.preventDefault();
            const statusEl = document.getElementById("feedback-message-status");
            const nameInput = document.getElementById("feedback-name");
            const emailInput = document.getElementById("feedback-email");
            const messageInput = document.getElementById("feedback-message");
            const submitBtn = event.target.querySelector('button[type="submit"]');

            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            const message = messageInput.value.trim();

            if (!name || !message) {
                statusEl.textContent = "לייג אריין נאמען און הערה.";
                statusEl.className = "auth-message error mt-3 text-center";
                return;
            }

            // Show loading state
            submitBtn.disabled = true;
            statusEl.textContent = "שיקן...";
            statusEl.className = "auth-message mt-3 text-center";

            try {
                // Store feedback locally and prepare for sending
                const feedback = {
                    name,
                    email,
                    message,
                    timestamp: new Date().toISOString(),
                    source: "hearos-form"
                };

                // If endpoint is configured, send to backend
                if (FEEDBACK_ENDPOINT) {
                    const response = await fetch(FEEDBACK_ENDPOINT, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(feedback)
                    });

                    if (!response.ok) {
                        throw new Error(`Server error: ${response.status}`);
                    }
                } else {
                    // Fallback: log locally and inform user to check backend setup
                    // (in production, should have backend configured)
                }

                // Success
                statusEl.textContent = "תודה! דיין הערה איז געק אָנגענומען. מיר וועלן זיך אנקוקן.";
                statusEl.className = "auth-message success mt-3 text-center";

                // Clear form
                nameInput.value = "";
                emailInput.value = "";
                messageInput.value = "";

                setTimeout(() => {
                    statusEl.textContent = "";
                    statusEl.className = "";
                }, 4000);

            } catch (error) {
                console.error("Feedback error:", error);
                statusEl.textContent = "מ'האט שווער דער הערה צו שיקן. פּרובירט שוב שפעטער.";
                statusEl.className = "auth-message error mt-3 text-center";
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
