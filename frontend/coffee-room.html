    <section class="member-board-section">
        <div class="member-board-wrap">
            <h1>Caveh Tzimer - סתם שמועסן</h1>
            <p class="member-board-sub">א פלאץ פאר קליינע מחשבות, חיזוק, און א פשוט'ן שמועס.</p>

            <form id="coffee-form" class="auth-card member-board-form">
                <label for="coffee-topic" class="form-label">טעמע (אפשאנעל)</label>
                <input id="coffee-topic" class="form-control" type="text" placeholder="ביישפיל: חיזוק פאר היינט">

                    required></textarea>

                <button type="submit" class="btn auth-btn mt-3">שיק אריין</button>
                <p id="coffee-status" class="auth-message mt-2" aria-live="polite"></p>

        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        const SESSION_KEY = "vosHeistCurrentUser";

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        async function renderFeed() {
            const feed = document.getElementById("coffee-feed");
            const response = await window.vosHeistApi.getCoffeeRoom();
            const messages = (response.messages || []).slice().reverse();

            if (!messages.length) {
                feed.innerHTML = '<article class="community-card"><p class="community-meta">נאכנישט קיין מעסעדזשעס.</p></article>';
                return;
            }

            feed.innerHTML = messages.map((entry) => {
                const topic = entry.topic ? `<p class="member-board-meta"><strong>טעמע:</strong> ${escapeHtml(entry.topic)}</p>` : "";
                return `<article class="community-card"><p class="community-name">${escapeHtml(entry.nickname)}</p>${topic}<p class="member-board-meta">${escapeHtml(entry.message)}</p></article>`;
            }).join("");
        }

        document.getElementById("coffee-form").addEventListener("submit", async (event) => {
            event.preventDefault();

            const status = document.getElementById("coffee-status");
            const currentUserKey = sessionStorage.getItem(SESSION_KEY);
            let user = null;
            try {
                const userResponse = await window.vosHeistApi.getUser(currentUserKey);
                user = userResponse.user;
            } catch {
                user = null;
            }

            const topic = document.getElementById("coffee-topic").value.trim();
            const message = document.getElementById("coffee-message").value.trim();

            if (!user || !message) {
                status.textContent = "לייג אריין א מעסעדזש.";
                status.className = "auth-message error mt-2";
                return;
            }

            await window.vosHeistApi.addCoffeeRoom({
                nickname: user.nickname || user.displayName || "מיטגליד",
                topic,
                message
            });

            event.target.reset();
            status.textContent = "ארויפגעלייגט אין Caveh Tzimer.";
            status.className = "auth-message success mt-2";
            await renderFeed();
        });

        renderFeed().catch((error) => {
            console.error(error);
            const feed = document.getElementById("coffee-feed");
            feed.innerHTML = '<article class="community-card"><p class="community-meta">נישט געקענט לאודן מעסעדזשעס יעצט.</p></article>';
        });
    </script>
