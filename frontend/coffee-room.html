        crossorigin="anonymous"></script>
    <script>
        const STORAGE_KEY = "vosHeistUsers";
        const SESSION_KEY = "vosHeistCurrentUser";
        const COFFEE_ROOM_KEY = "vosHeistCoffeeRoomMessages";

        function loadUsers() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : {};
            } catch {
                return {};
            }
        }

        function loadMessages() {
            try {
                const raw = localStorage.getItem(COFFEE_ROOM_KEY);
                const messages = raw ? JSON.parse(raw) : [];
                return Array.isArray(messages) ? messages : [];
            } catch {
                return [];
            }
        }

        function saveMessages(messages) {
            localStorage.setItem(COFFEE_ROOM_KEY, JSON.stringify(messages));
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function renderFeed() {
            const feed = document.getElementById("coffee-feed");
            const messages = loadMessages().reverse();

            if (!messages.length) {
                feed.innerHTML = '<article class="community-card"><p class="community-meta">נאכנישט קיין מעסעדזשעס.</p></article>';
                return;
            }

            feed.innerHTML = messages.map((entry) => {
                const topic = entry.topic ? `<p class="member-board-meta"><strong>טעמע:</strong> ${escapeHtml(entry.topic)}</p>` : "";
                return `<article class="community-card"><p class="community-name">${escapeHtml(entry.nickname)}</p>${topic}<p class="member-board-meta">${escapeHtml(entry.message)}</p></article>`;
            }).join("");
        }

        document.getElementById("coffee-form").addEventListener("submit", (event) => {
            event.preventDefault();

            const status = document.getElementById("coffee-status");
            const currentUserKey = sessionStorage.getItem(SESSION_KEY);
            const users = loadUsers();
            const user = users[currentUserKey];

            const topic = document.getElementById("coffee-topic").value.trim();
            const message = document.getElementById("coffee-message").value.trim();

            if (!user || !message) {
                status.textContent = "לייג אריין א מעסעדזש.";
                status.className = "auth-message error mt-2";
                return;
            }

            const allMessages = loadMessages();
            allMessages.push({
                nickname: user.nickname || user.displayName || "מיטגליד",
                topic,
                message,
                createdAt: new Date().toISOString()
            });

            saveMessages(allMessages);
            event.target.reset();
            status.textContent = "ארויפגעלייגט אין קאווע רום.";
            status.className = "auth-message success mt-2";
            renderFeed();
        });

        renderFeed();
    </script>
