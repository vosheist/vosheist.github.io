    <script src="script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        const SESSION_KEY = "vosHeistCurrentUser";
        const currentUserKey = sessionStorage.getItem(SESSION_KEY);
        let currentUser = null;

        async function hashPassword(password) {
            if (window.crypto && window.crypto.subtle) {
                const data = new TextEncoder().encode(password);
                const digest = await window.crypto.subtle.digest("SHA-256", data);
                return Array.from(new Uint8Array(digest))
                    .map((b) => b.toString(16).padStart(2, "0"))
                    .join("");
            }
            return password;
        }

        function showMessage(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.classList.remove("error", "success");
            if (type) {
                el.classList.add(type);
            }
        }

        function fillProfileView() {
            document.getElementById("account-name").textContent = currentUser.displayName || "-";
            document.getElementById("account-nickname").textContent = currentUser.nickname || currentUser.displayName || "-";
            document.getElementById("profile-login-name").textContent = currentUserKey || "-";
            document.getElementById("profile-firstname").textContent = currentUser.firstname || "-";
            document.getElementById("profile-lastname").textContent = currentUser.lastname || "-";
            document.getElementById("profile-nickname").textContent = currentUser.nickname || "-";
            document.getElementById("profile-email").textContent = currentUser.email || "-";
        }

        function openProfileWithCurrentData() {
            document.getElementById("profile-firstname-input").value = currentUser.firstname || "";
            document.getElementById("profile-lastname-input").value = currentUser.lastname || "";
            document.getElementById("profile-nickname-input").value = currentUser.nickname || "";
            document.getElementById("profile-email-input").value = currentUser.email || "";
            document.getElementById("profile-current-password").value = "";
            document.getElementById("profile-new-password").value = "";
            document.getElementById("profile-confirm-password").value = "";
            showMessage("profile-message", "", null);
        }

        document.getElementById("open-profile-modal-btn").addEventListener("click", openProfileWithCurrentData);

        document.getElementById("profile-form").addEventListener("submit", async (event) => {
            event.preventDefault();

            const firstname = document.getElementById("profile-firstname-input").value.trim();
            const lastname = document.getElementById("profile-lastname-input").value.trim();
            const nickname = document.getElementById("profile-nickname-input").value.trim();
            const email = document.getElementById("profile-email-input").value.trim();
            const currentPassword = document.getElementById("profile-current-password").value;
            const newPassword = document.getElementById("profile-new-password").value;
            const confirmPassword = document.getElementById("profile-confirm-password").value;

            if (!firstname || firstname.length < 2) {
                showMessage("profile-message", "ערשטע נאמען דארף זיין כאטש 2 אותיות.", "error");
                return;
            }

            if (!lastname || lastname.length < 2) {
                showMessage("profile-message", "לעצטע נאמען דארף זיין כאטש 2 אותיות.", "error");
                return;
            }

            if (!nickname || nickname.length < 2) {
                showMessage("profile-message", "פען נאמען דארף זיין כאטש 2 אותיות.", "error");
                return;
            }

            if (!email || !email.includes("@")) {
                showMessage("profile-message", "לייג אריין א גילטיקן אימעיל.", "error");
                return;
            }

            let nextPasswordHash = null;
            const wantsPasswordChange = Boolean(currentPassword || newPassword || confirmPassword);

            if (wantsPasswordChange) {
                if (!currentPassword || newPassword.length < 4 || newPassword !== confirmPassword) {
                    showMessage("profile-message", "קאוד ענדערונג איז נישט גילטיג.", "error");
                    return;
                }

                const currentHash = await hashPassword(currentPassword);
                if (currentHash !== currentUser.passwordHash) {
                    showMessage("profile-message", "דער יעצטיגער קאוד איז נישט ריכטיג.", "error");
                    return;
                }

                nextPasswordHash = await hashPassword(newPassword);
            }

            try {
                const updated = await window.vosHeistApi.updateProfile(currentUserKey, {
                    firstname,
                    lastname,
                    nickname,
                    email,
                    passwordHash: nextPasswordHash
                });
                currentUser = updated.user;
                fillProfileView();
                showMessage("profile-message", "פרופיל איז אפדעיטעד.", "success");
                showMessage("profile-inline-message", "פרופיל איז אפדעיטעד.", "success");
                setTimeout(() => {
                    const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById("profileModal"));
                    modal.hide();
                    showMessage("profile-message", "", null);
                }, 600);
            } catch (error) {
                const msg = String(error.message || "").toLowerCase();
                if (msg.includes("nickname")) {
                    showMessage("profile-message", "דער פען נאמען איז שוין פארנומען.", "error");
                    return;
                }
                showMessage("profile-message", "קען נישט היטן יעצט. פרוביר נאכאמאל.", "error");
            }
        });

        document.getElementById("logout-btn").addEventListener("click", () => {
            sessionStorage.removeItem(SESSION_KEY);
            window.location.href = "nafshi.html";
        });

        async function initializePage() {
            if (!currentUserKey) {
                window.location.href = "nafshi.html";
                return;
            }

            try {
                const response = await window.vosHeistApi.getUser(currentUserKey);
                currentUser = response.user;
                fillProfileView();
            } catch {
                sessionStorage.removeItem(SESSION_KEY);
                window.location.href = "nafshi.html";
            }
        }

        initializePage();
    </script>
