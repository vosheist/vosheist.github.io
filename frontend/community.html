        crossorigin="anonymous"></script>
    <script>
        const SESSION_KEY = "vosHeistCurrentUser";
        const currentUserKey = sessionStorage.getItem(SESSION_KEY);

        if (!currentUserKey) {
            window.location.href = "nafshi.html";
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function summarize(user) {
            const records = Array.isArray(user.records) ? user.records : [];
            return {
                mitzvah: records.filter((r) => r.type === "mitzvah").length,
                aveirah: records.filter((r) => r.type === "aveirah").length,
                total: records.length
            };
        }

        let communityUsers = {};

        async function renderCommunity() {
            const response = await window.vosHeistApi.getCommunity(currentUserKey);
            const grid = document.getElementById("community-grid");
            const entries = response.users || [];

            communityUsers = {};
            entries.forEach((entry) => {
                communityUsers[entry.key] = entry.user;
            });

            if (!entries.length) {
                grid.innerHTML = '<div class="community-card"><p class="community-meta">נאכנישט קיין מיטגלידער מיט רעקארדס.</p></div>';
                return;
            }

            grid.innerHTML = entries.map(({ key, user }) => {
                const stats = summarize(user);
                const nickname = user.nickname || user.displayName || key;
                return `<article class="community-card"><p class="community-name">${escapeHtml(nickname)}</p><p class="community-meta">מצוות: ${stats.mitzvah} | עבירות: ${stats.aveirah} | סך הכל: ${stats.total}</p><button class="btn btn-outline-primary btn-sm js-view-user" data-user-key="${escapeHtml(key)}">זע רעקארדס</button></article>`;
            }).join("");

            grid.querySelectorAll(".js-view-user").forEach((button) => {
                button.addEventListener("click", () => {
                    openUserRecords(button.getAttribute("data-user-key"));
                });
            });
        }

        function openUserRecords(userKey) {
            const user = communityUsers[userKey];
            if (!user) {
                return;
            }

            const nickname = user.nickname || user.displayName || userKey;
            const records = Array.isArray(user.records) ? [...user.records].reverse() : [];
            const list = document.getElementById("community-record-list");
            const title = document.getElementById("communityRecordModalLabel");
            title.textContent = `${nickname} - רעקארדס`;

            if (!records.length) {
                list.innerHTML = '<li class="record-empty">נאכנישט קיין רעקארדס.</li>';
            } else {
                list.innerHTML = records.map((record) => {
                    const label = record.type === "mitzvah" ? "מצוה" : "עבירה";
                    const itemClass = record.type === "mitzvah" ? "record-mitzvah" : "record-aveirah";
                    const when = record.happenedOn || new Date(record.createdAt).toLocaleString();
                    const titleText = escapeHtml(record.title || record.text || "-");
                    const detail = record.details ? `<span class="record-detail">${escapeHtml(record.details)}</span>` : "";
                    return `<li class="record-item ${itemClass}"><span class="record-label">${label}</span><span class="record-text"><span class="record-title">${titleText}</span>${detail}</span><span class="record-date">${escapeHtml(when)}</span></li>`;
                }).join("");
            }

            const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById("communityRecordModal"));
            modal.show();
        }

        renderCommunity().catch((error) => {
            console.error(error);
            const grid = document.getElementById("community-grid");
            grid.innerHTML = '<div class="community-card"><p class="community-meta">נישט געקענט לאודן קהילה יעצט.</p></div>';
        });
    </script>
