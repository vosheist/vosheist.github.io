        crossorigin="anonymous"></script>
    <script>
        const SESSION_KEY = "vosHeistCurrentUser";
        const currentUserKey = sessionStorage.getItem(SESSION_KEY);

        if (!currentUserKey) {
            window.location.href = "nafshi.html";
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        async function renderCommunity() {
            const response = await window.vosHeistApi.getCommunity(currentUserKey);
            const grid = document.getElementById("community-grid");
            const entries = response.users || [];

            if (!entries.length) {
                grid.innerHTML = '<div class="community-card"><p class="community-meta">נאכנישט קיין מיטגלידער.</p></div>';
                return;
            }

            grid.innerHTML = entries.map(({ key, user }) => {
                const nickname = user.nickname || user.displayName || key;
                const joined = user.createdAt ? new Date(user.createdAt).toLocaleDateString() : "-";
                return `<article class="community-card"><p class="community-name">${escapeHtml(nickname)}</p><p class="community-meta">נאמען: ${escapeHtml(user.displayName || "-")}</p><p class="community-meta">אימעיל: ${escapeHtml(user.email || "-")}</p><p class="community-meta">אריינגעקומען: ${escapeHtml(joined)}</p></article>`;
            }).join("");
        }

        renderCommunity().catch((error) => {
            console.error(error);
            const grid = document.getElementById("community-grid");
            grid.innerHTML = '<div class="community-card"><p class="community-meta">נישט געקענט לאודן קהילה יעצט.</p></div>';
        });
    </script>
