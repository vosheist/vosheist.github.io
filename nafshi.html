    <section class="auth-section">
        <div class="auth-wrap">
            <h2>אַרײַנגיין צו נפשי</h2>
            <form id="login-form" class="auth-card auth-single">
                <h3>לאָג אַריין</h3>
                <label for="login-name" class="form-label">נאָמען</label>
                <input id="login-name" name="name" class="form-control" type="text" required>
                <label for="login-password" class="form-label">פּאַראָל</label>

                <button type="button" class="btn btn-outline-secondary auth-switch-btn" data-bs-toggle="modal"

    <div class="modal fade" id="createAccountModal" tabindex="-1" aria-labelledby="createAccountModalLabel"

        <div class="modal-dialog modal-dialog-centered">

                <div class="modal-header">
                    <h4 class="modal-title" id="createAccountModalLabel">שאַף אַ נײַעם חשבון</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="create-account-form">
                    <div class="modal-body">
                        <label for="create-name" class="form-label">נאָמען</label>
                        <input id="create-name" name="name" class="form-control" type="text" required>
                        <label for="create-nickname" class="form-label mt-2">פען נאמען (זעהבאר פאר אנדערע)</label>
                        <input id="create-nickname" name="nickname" class="form-control" type="text" maxlength="24"
                            required>
                        <label for="create-password" class="form-label mt-2">פּאַראָל</label>
                        <input id="create-password" name="password" class="form-control" type="password" minlength="4"
                            required>
                        <label for="create-password-confirm" class="form-label mt-2">באַשטעטיק פּאַראָל</label>
                        <input id="create-password-confirm" name="passwordConfirm" class="form-control" type="password"
                            minlength="4" required>
                        <p id="create-message" class="auth-message mt-2" aria-live="polite"></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary auth-btn">שאַפֿן חשבון</button>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        const STORAGE_KEY = "vosHeistUsers";
        const SESSION_KEY = "vosHeistCurrentUser";
        const SIGNUP_NOTIFY_ENDPOINT = "";

        function loadUsers() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : {};
            } catch {
                return {};
            }
        }

        function saveUsers(users) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
        }

        function normalizeName(name) {
            return name.trim().toLowerCase();
        }

        function normalizeNickname(nickname) {
            return nickname.trim().toLowerCase();
        }

        function nicknameExists(users, nickname, excludeUserKey) {
            const target = normalizeNickname(nickname);
            return Object.entries(users).some(([key, user]) => {
                if (excludeUserKey && key === excludeUserKey) {
                    return false;
                }
                if (!user || typeof user.nickname !== "string") {
                    return false;
                }
                return normalizeNickname(user.nickname) === target;
            });
        }

        async function hashPassword(password) {
            if (window.crypto && window.crypto.subtle) {
                const data = new TextEncoder().encode(password);
                const digest = await window.crypto.subtle.digest("SHA-256", data);
                return Array.from(new Uint8Array(digest))
                    .map((b) => b.toString(16).padStart(2, "0"))
                    .join("");
            }
            return password;
        }

        function showMessage(element, text, type) {
            element.textContent = text;
            element.classList.remove("error", "success");
            if (type) {
                element.classList.add(type);
            }
        }

        async function notifyOwnerOnSignup(newUser) {
            if (!SIGNUP_NOTIFY_ENDPOINT) {
                return { sent: false, reason: "missing-endpoint" };
            }

            const payload = {
                event: "new_signup",
                displayName: newUser.displayName,
                nickname: newUser.nickname,
                createdAt: new Date().toISOString(),
                source: "vos-heist"
            };

            try {
                const response = await fetch(SIGNUP_NOTIFY_ENDPOINT, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    return { sent: false, reason: `http-${response.status}` };
                }

                return { sent: true };
            } catch {
                return { sent: false, reason: "network-error" };
            }
        }

        document.getElementById("create-account-form").addEventListener("submit", async (event) => {
            event.preventDefault();
            const createMessage = document.getElementById("create-message");
            const nameInput = document.getElementById("create-name");
            const nicknameInput = document.getElementById("create-nickname");
            const passwordInput = document.getElementById("create-password");
            const confirmInput = document.getElementById("create-password-confirm");

            const name = nameInput.value;
            const nickname = nicknameInput.value.trim();
            const password = passwordInput.value;
            const userKey = normalizeName(name);

            if (!userKey) {
                showMessage(createMessage, "שרייב אַ נאָמען.", "error");
                return;
            }

            if (!nickname || nickname.length < 2) {
                showMessage(createMessage, "שרייב א פען נאמען (מינימום 2 אותיות).", "error");
                return;
            }

            if (password.length < 4) {
                showMessage(createMessage, "פּאַראָל דאַרף האָבן 4 אותיות אָדער מער.", "error");
                return;
            }

            if (password !== confirmInput.value) {
                showMessage(createMessage, "ביידע פּאַראָלן דאַרפֿן זיין די זעלבע.", "error");
                return;
            }

            const users = loadUsers();
            if (users[userKey]) {
                showMessage(createMessage, "דער נאָמען איז שוין פאראן.", "error");
                return;
            }

            if (nicknameExists(users, nickname, null)) {
                showMessage(createMessage, "דער פען נאמען איז שוין פארנומען.", "error");
                return;
            }

            users[userKey] = {
                displayName: name.trim(),
                nickname,
                records: [],
                passwordHash: await hashPassword(password)
            };

            saveUsers(users);
            const notification = await notifyOwnerOnSignup(users[userKey]);
            showMessage(createMessage, "חשבון געשאַפֿן. דו קענסט יעצט לאָג אַריין.", "success");
            if (!notification.sent && notification.reason !== "missing-endpoint") {
                console.warn("Signup created, but owner notification failed:", notification.reason);
            }
            nameInput.value = "";
            nicknameInput.value = "";
            passwordInput.value = "";
            confirmInput.value = "";

            setTimeout(() => {
                const modalElement = document.getElementById("createAccountModal");
                const modal = bootstrap.Modal.getOrCreateInstance(modalElement);
                modal.hide();
                showMessage(createMessage, "", null);
            }, 700);
        });

        document.getElementById("login-form").addEventListener("submit", async (event) => {
            event.preventDefault();
            const loginMessage = document.getElementById("login-message");
            const nameInput = document.getElementById("login-name");
            const passwordInput = document.getElementById("login-password");

            const name = nameInput.value;
            const userKey = normalizeName(name);
            const users = loadUsers();
            const user = users[userKey];

            if (!user) {
                showMessage(loginMessage, "קיין חשבון ניט געפונען פאר דעם נאָמען.", "error");
                return;
            }

            const incomingHash = await hashPassword(passwordInput.value);
            if (incomingHash !== user.passwordHash) {
                showMessage(loginMessage, "פאַלשער פּאַראָל.", "error");
                return;
            }

            sessionStorage.setItem(SESSION_KEY, userKey);
            showMessage(loginMessage, `${user.displayName}, ברוך הבא!`, "success");
            setTimeout(() => {
                window.location.href = "account.html";
            }, 450);
        });
    </script>
